<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستودع تجارب المجرات</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* زر تعديل اللون والقائمة المنسدلة (فوق على اليسار حسب الرسم) */
        .color-dropdown-wrapper {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .dropdown-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 10px 16px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dropdown-btn::after {
            content: '▼';
            font-size: 9px;
            transition: transform 0.3s;
        }
        .dropdown-btn.open::after {
            transform: rotate(180deg);
        }
        .color-menu {
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 8px;
            display: none; /* مخفي بالبداية */
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }
        .color-option {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 12px;
            cursor: pointer;
            text-align: right;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .color-option:hover, .color-option.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        /* أزرار الأشكال أسفل الشاشة (حسب الرسم) */
        .controls-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: max-content;
            max-width: 90%;
        }
        .btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            white-space: nowrap;
        }
        .btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="color-dropdown-wrapper">
        <button class="dropdown-btn" onclick="toggleDropdown(this)">تعديل اللون</button>
        <div class="color-menu" id="colorMenu">
            <button class="color-option active" onclick="changeColor('neon', this)">
                <span class="color-dot" style="background: linear-gradient(45deg, #00d4ff, #ff007f);"></span>
                النيون الكوني
            </button>
            <button class="color-option" onclick="changeColor('gold', this)">
                <span class="color-dot" style="background: linear-gradient(45deg, #ff9900, #00ff88);"></span>
                فجر السديم
            </button>
            <button class="color-option" onclick="changeColor('ice', this)">
                <span class="color-dot" style="background: linear-gradient(45deg, #00ffff, #7f00ff);"></span>
                الجليد القطبي
            </button>
        </div>
    </div>

    <div class="controls-container">
        <button class="btn active" onclick="switchGalaxy('spiral', this)">الحلزونية</button>
        <button class="btn" onclick="switchGalaxy('burst', this)">الانفجار</button>
        <button class="btn" onclick="switchGalaxy('vortex', this)">الثقب الأسود</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
        let currentGalaxy = null;
        let galaxyType = 'spiral'; 
        let colorTheme = 'neon';
        let transitionProgress = 1.0; 
        let isTransitioning = false;
        let nextGalaxyType = '';
        let nextColorTheme = '';

        // تعريف سمات الألوان المحددة
        const themes = {
            neon: { core: '#00d4ff', edge: '#ff007f' },
            gold: { core: '#ff9900', edge: '#00ff88' },
            ice:  { core: '#00ffff', edge: '#7f00ff' }
        };

        function createGalaxy(type, themeName) {
            if (currentGalaxy) scene.remove(currentGalaxy);

            const count = 25000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            const colorCore = new THREE.Color(themes[themeName].core);
            const colorEdge = new THREE.Color(themes[themeName].edge);

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                if (type === 'spiral') {
                    const radius = Math.random() * 3;
                    const spinAngle = radius * 2.5;
                    const arms = 5;
                    const armAngle = ((i % arms) / arms) * Math.PI * 2;

                    const randomX = (Math.random() - 0.5) * 0.3 * (radius + 0.2);
                    const randomY = (Math.random() - 0.5) * 0.3 * (radius + 0.2);
                    const randomZ = (Math.random() - 0.5) * 0.3 * (radius + 0.2);

                    positions[i3] = Math.cos(armAngle + spinAngle) * radius + randomX;
                    positions[i3 + 1] = randomY * 0.4; 
                    positions[i3 + 2] = Math.sin(armAngle + spinAngle) * radius + randomZ;

                } else if (type === 'burst') {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    const dist = Math.pow(Math.random(), 2) * 3.5 + 0.1;

                    positions[i3] = dist * Math.sin(phi) * Math.cos(theta);
                    positions[i3 + 1] = dist * Math.sin(phi) * Math.sin(theta);
                    positions[i3 + 2] = dist * Math.cos(phi);

                } else if (type === 'vortex') {
                    const radius = Math.random() * 2.5 + 0.2;
                    const angle = Math.random() * Math.PI * 2;
                    
                    positions[i3] = Math.cos(angle) * radius;
                    positions[i3 + 1] = (Math.random() - 0.5) * 0.1 * (3 - radius);
                    positions[i3 + 2] = Math.sin(angle) * radius;
                }

                const distFromCenter = Math.sqrt(positions[i3]**2 + positions[i3+2]**2);
                const mixedColor = colorCore.clone();
                mixedColor.lerp(colorEdge, distFromCenter / 3);

                colors[i3] = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.015,
                vertexColors: true,
                transparent: true,
                opacity: 1.0,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            currentGalaxy = new THREE.Points(geometry, material);
            scene.add(currentGalaxy);
        }

        createGalaxy(galaxyType, colorTheme);

        // فتح وإغلاق القائمة المنسدلة لمسة ناعمة
        function toggleDropdown(btn) {
            const menu = document.getElementById('colorMenu');
            if (menu.style.display === 'flex') {
                menu.style.display = 'none';
                btn.classList.remove('open');
            } else {
                menu.style.display = 'flex';
                btn.classList.add('open');
            }
        }

        // تغيير اللون مع تأثير التلاشي والانتقال
        function changeColor(theme, optionBtn) {
            if (isTransitioning || colorTheme === theme) return;
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('active'));
            optionBtn.classList.add('active');

            isTransitioning = true;
            nextGalaxyType = galaxyType;
            nextColorTheme = theme;
            
            // إغلاق القائمة تلقائياً بعد الاختيار
            document.getElementById('colorMenu').style.display = 'none';
            document.querySelector('.dropdown-btn').classList.remove('open');
        }

        // تغيير شكل المجرة
        function switchGalaxy(type, button) {
            if (isTransitioning || galaxyType === type) return;
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            isTransitioning = true;
            nextGalaxyType = type;
            nextColorTheme = colorTheme;
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const elapsedTime = clock.getElapsedTime();

            if (currentGalaxy) {
                if (galaxyType === 'spiral') {
                    currentGalaxy.rotation.y = elapsedTime * 0.15;
                    currentGalaxy.rotation.x = 0.3; 
                } else if (galaxyType === 'burst') {
                    currentGalaxy.rotation.y = elapsedTime * 0.05;
                    currentGalaxy.rotation.x = elapsedTime * 0.03;
                } else if (galaxyType === 'vortex') {
                    currentGalaxy.rotation.y = elapsedTime * 0.4; 
                    currentGalaxy.rotation.x = 0.6;
                }

                // سحر التلاشي والوميض عند التغيير
                if (isTransitioning) {
                    transitionProgress -= 0.05; 
                    currentGalaxy.material.opacity = transitionProgress;

                    if (transitionProgress <= 0) {
                        galaxyType = nextGalaxyType;
                        colorTheme = nextColorTheme;
                        createGalaxy(galaxyType, colorTheme);
                        transitionProgress = 0;
                    }
                } else if (transitionProgress < 1.0) {
                    transitionProgress += 0.05; 
                    currentGalaxy.material.opacity = transitionProgress;
                }

                if (isTransitioning && transitionProgress === 0) {
                    isTransitioning = false; 
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
